name: build sync image

on:
  push:
    branches: [main]
    paths:
      - "Dockerfile"
      - "sync-woltlab-users-k8s.sh"
      - "sync_users.rb"
      - ".github/workflows/build-image.yml"
  schedule:
    # Daily at 04:30 UTC, 30 min after discourse-image so we don't both
    # hammer GHCR at the same time.
    - cron: "30 4 * * *"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: build-image-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Compute tag
        id: tag
        run: |
          ts=$(date -u +%Y%m%d-%H%M)
          sha=${GITHUB_SHA::7}
          echo "tag=stable-${ts}-${sha}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/vzekc/discourse-woltlab-sync:stable
            ghcr.io/vzekc/discourse-woltlab-sync:${{ steps.tag.outputs.tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
